services:
  db:
    image: neondatabase/neon_local:latest

    ports:
      - "5432:5432"

    environment:
      NEON_API_KEY: ${NEON_API_KEY}
      NEON_PROJECT_ID: ${NEON_PROJECT_ID}

  app:
    build: .

    container_name: acquisitions-api

    depends_on:
      - db

    env_file:
      - .env.development

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run dev